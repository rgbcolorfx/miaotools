<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiaoTools - Online Toolbox</title>
    <meta
      id="metaDescription"
      name="description"
      content="MiaoTools: static online toolbox deployable to GitHub Pages."
    />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="googlebot" content="index,follow" />
    <meta name="theme-color" content="#0f766e" />
    <link id="canonicalLink" rel="canonical" href="https://miaotools.top/" />

    <meta id="ogTitle" property="og:title" content="MiaoTools - Online Toolbox" />
    <meta
      id="ogDescription"
      property="og:description"
      content="MiaoTools: static online toolbox deployable to GitHub Pages."
    />
    <meta id="ogUrl" property="og:url" content="https://miaotools.top/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary" />
    <meta id="twitterTitle" name="twitter:title" content="MiaoTools - Online Toolbox" />
    <meta
      id="twitterDescription"
      name="twitter:description"
      content="MiaoTools: static online toolbox deployable to GitHub Pages."
    />

    <script id="ldWebSite" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "MiaoTools",
        "url": "https://miaotools.top/"
      }
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__inner">
        <div class="hero__top">
          <p id="brandTitle" class="hero__eyebrow">MiaoTools / 秒用工具箱</p>
          <div class="hero__controls">
            <label for="langSelect" id="langLabel" class="hero__label">Language</label>
            <select id="langSelect" class="hero__select">
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
              <option value="ru">Русский</option>
            </select>
          </div>
        </div>
        <div class="hero__search">
          <input id="searchInput" type="search" placeholder="搜索工具，例如：复利、JSON、时间戳" />
          <button id="clearSearch" class="btn btn--ghost">清空</button>
        </div>
      </div>
    </header>

    <main class="shell">
      <section id="overviewPage" class="page page--overview">
        <div class="toolbar">
          <div id="categoryChips" class="chips"></div>
          <div id="resultCount" class="result-count"></div>
        </div>
        <div id="directory" class="directory"></div>
      </section>

      <section id="detailPage" class="page page--detail hidden">
        <div class="detail-head">
          <button id="backToList" class="btn btn--ghost">返回工具目录</button>
          <p id="detailCategory" class="detail-category"></p>
          <h2 id="detailTitle"></h2>
          <p id="detailDesc" class="detail-desc"></p>
        </div>
        <article class="tool-panel">
          <div id="detailToolUI"></div>
        </article>
      </section>
    </main>

    <footer class="footer">
      <p id="visitCount" class="footer__visit">Total visits: --</p>
      <div class="footer__seo">
        <p id="seoLinksLabel" class="footer__seo-label">Tool links for indexing</p>
        <nav id="seoToolLinks" class="seo-links" aria-label="Tool links"></nav>
      </div>
    </footer>

    <template id="toolCardTemplate">
      <article class="tool-card">
        <h3 data-tool-title class="tool-card__title"></h3>
        <p data-tool-desc></p>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
